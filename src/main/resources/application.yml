server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/airline_db?createDatabaseIfNotExist=true
    username: root
    password: root123
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: your_email@gmail.com
    password: your_16_char_app_password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

admin:
  default-email: admin@airline.com
  default-password: Admin@123

jwt:
  secret: your-256-bit-secret-key-change-this-in-production-make-it-long
  expiration: 86400000

logging:
  level:
    org.springframework.security: DEBUG